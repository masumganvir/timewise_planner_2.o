<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e85d2f"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="16"/>
  <!-- Progress arc -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-dasharray="660" stroke-dashoffset="165" transform="rotate(-90 256 256)"/>
  <!-- Clock center -->
  <circle cx="256" cy="256" r="12" fill="white"/>
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="256" y2="180" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Minute hand (lightning bolt style) -->
  <line x1="256" y1="256" x2="310" y2="210" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Lightning bolt accent -->
  <path d="M 340 140 L 320 180 L 345 175 L 325 220" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
